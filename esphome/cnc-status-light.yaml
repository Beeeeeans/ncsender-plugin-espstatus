# =============================================================================
#  CNC Status Light — ESPHome configuration
#  for use with the ncSender "ESP Status Light" plugin
# =============================================================================
#
#  Quick-start
#  -----------
#  1. Copy secrets.yaml.example → secrets.yaml  (same folder) and fill it in.
#  2. Edit the substitutions below to match your board and LED strip.
#  3. Run:  esphome run cnc-status-light.yaml
#  4. Note the static_ip — enter it as "ESP32 Host" in the ncSender plugin.
#
#  Supported boards (set 'board' under esp32:)
#    esp32dev          — generic ESP32 / WROOM-32 / WROVER
#    esp32-s3-devkitc-1 — ESP32-S3
#    esp32-c3-devkitm-1 — ESP32-C3  (use single-core framework)
#    lolin_s2_mini     — LOLIN S2 Mini (ESP32-S2)
#
#  Supported LED strips (set led_type + led_variant)
#    WS2812B  → type: GRB,  variant: WS2812
#    SK6812   → type: GRBW, variant: SK6812  (has white channel)
#    WS2811   → type: RGB,  variant: WS2811
#    APA102   → use platform: fastled_spi instead of neopixelbus
#    NeoPixel → same as WS2812B
# =============================================================================

substitutions:
  device_name:  cnc-status-light
  friendly_name: CNC Status Light

  # ── Network ─────────────────────────────────────────────────────────────── #
  static_ip:  "192.168.1.100"   # Must match "ESP32 Host" in ncSender plugin
  gateway:    "192.168.1.1"
  subnet:     "255.255.255.0"

  # ── LED strip hardware ───────────────────────────────────────────────────── #
  data_pin:    GPIO13            # GPIO48 = onboard RGB LED on ESP32-S3 DevKitC
  num_leds:    "87"              # 1 for onboard LED; change when using a strip
  led_type:    GRB              # GRB for WS2812B | GRBW for SK6812
  led_variant: WS2812           # WS2812 (use for WS2812B hardware) | WS2812X | SK6812 | WS2811


# =============================================================================

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: arduino

# ── WiFi ──────────────────────────────────────────────────────────────────── #

wifi:
  ssid:     !secret wifi_ssid
  password: !secret wifi_password

  # Static IP keeps the ncSender plugin address stable after reboots
  manual_ip:
    static_ip: ${static_ip}
    gateway:   ${gateway}
    subnet:    ${subnet}

  # Fallback access point if the main network is unreachable
  ap:
    ssid:     !secret fallback_ap_ssid
    password: !secret fallback_ap_password

captive_portal:

# ── Core services ─────────────────────────────────────────────────────────── #

logger:
  level: INFO

# ESPHome native API — optional, enables Home Assistant integration.
# Uncomment and add api_encryption_key to secrets.yaml if you use HA.
# api:
#   encryption:
#     key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

# Web server — REQUIRED: this is the REST API used by the ncSender plugin
web_server:
  port: 80
  version: 1
  css_url: ""
  css_include: "custom.css"

# ── Progress value entity ──────────────────────────────────────────────────── #
#
# The ncSender plugin posts the job completion percentage here:
#   POST http://<ip>/number/cnc_progress/set?value=45.5
#
# Entity ID is set by `name:` lowercased with spaces → underscores → "cnc_progress"
# Must match "Progress Entity ID" in the ncSender plugin settings.

number:
  - platform: template
    name:          "cnc_progress"
    id:            cnc_progress
    icon:          mdi:percent
    min_value:     0
    max_value:     100
    step:          0.1
    optimistic:    true
    initial_value: 0
    restore_value: false
    set_action:
      - lambda: "id(cnc_progress).publish_state(x);"

# ── Progress bar invert switch ─────────────────────────────────────────────── #
#
# When ON, the bar fills from right-to-left instead of left-to-right.
# Toggled by the ncSender plugin:
#   POST http://<ip>/switch/prog_invert/turn_on   (or turn_off)

switch:
  - platform: template
    name: "prog_invert"
    id:   prog_invert
    optimistic:   true
    restore_mode: RESTORE_DEFAULT_OFF

# ── Progress bar colour pickers ────────────────────────────────────────────── #
#
# Three virtual RGB lights — shown as colour pickers in the ESPHome web UI
# and the ncSender plugin. They drive no physical LEDs; they exist only to
# store the three progress bar colours and expose them over the REST API.
#
# The ncSender plugin sets them on connect:
#   POST http://<ip>/light/prog_fill/turn_on?r=0&g=80&b=255&brightness=255
#
# The addressable_lambda reads the stored colour values in real time.

output:
  - platform: template
    id: fake_fill_r
    type: float
    write_action:
      - lambda: return;
  - platform: template
    id: fake_fill_g
    type: float
    write_action:
      - lambda: return;
  - platform: template
    id: fake_fill_b
    type: float
    write_action:
      - lambda: return;

  - platform: template
    id: fake_bg_r
    type: float
    write_action:
      - lambda: return;
  - platform: template
    id: fake_bg_g
    type: float
    write_action:
      - lambda: return;
  - platform: template
    id: fake_bg_b
    type: float
    write_action:
      - lambda: return;

  - platform: template
    id: fake_head_r
    type: float
    write_action:
      - lambda: return;
  - platform: template
    id: fake_head_g
    type: float
    write_action:
      - lambda: return;
  - platform: template
    id: fake_head_b
    type: float
    write_action:
      - lambda: return;

# ── LED strip ─────────────────────────────────────────────────────────────── #
#
# Entity name → "cnc_status" (used as Light Entity ID in plugin settings).
#
# For APA102 / SK9822 (SPI-based strips), replace 'neopixelbus' with:
#   platform: fastled_spi
#   chipset:  APA102
#   data_pin: ${data_pin}
#   clock_pin: GPIO18          # APA102 also needs a clock pin

light:
  # Progress bar colour pickers — virtual RGB lights backed by no-op outputs.
  # Colours are set live by the ncSender plugin; colours persist in flash.
  - platform: rgb
    name: "prog_fill"
    id: prog_fill_light
    red:   fake_fill_r
    green: fake_fill_g
    blue:  fake_fill_b
    restore_mode: ALWAYS_OFF
    default_transition_length: 0ms

  - platform: rgb
    name: "prog_bg"
    id: prog_bg_light
    red:   fake_bg_r
    green: fake_bg_g
    blue:  fake_bg_b
    restore_mode: ALWAYS_OFF
    default_transition_length: 0ms

  - platform: rgb
    name: "prog_head"
    id: prog_head_light
    red:   fake_head_r
    green: fake_head_g
    blue:  fake_head_b
    restore_mode: ALWAYS_OFF
    default_transition_length: 0ms

  - platform: neopixelbus
    type:     ${led_type}
    variant:  ${led_variant}
    pin:      ${data_pin}
    num_leds: ${num_leds}
    name:     "cnc_status"
    id:       cnc_status
    restore_mode: ALWAYS_OFF
    gamma_correct: 0
    default_transition_length: 300ms

    effects:

      # ── Works on any strip ───────────────────────────────────────────────── #

      # Gentle breathe — Hold, Door, Tool Change
      - pulse:
          name: "Pulse"
          transition_length: 400ms
          update_interval:   400ms
          min_brightness:    15%
          max_brightness:    100%

      # Rapid flash — Alarm (urgent)
      - pulse:
          name: "Fast Pulse"
          transition_length: 140ms
          update_interval:   140ms
          min_brightness:    5%
          max_brightness:    100%

      # Hard on/off strobe — Alarm, Door
      - strobe:
          name: "Strobe"
          colors:
            - state: true
              brightness: 100%
              duration:   60ms
            - state: false
              duration:   120ms

      # Candle-like flicker — Tool Change
      - flicker:
          name: "Flicker"
          alpha:     0.95
          intensity: 2%

      # ── Addressable-strip effects ────────────────────────────────────────── #

      # Bouncing segment — Homing
      - addressable_scan:
          name: "Scan"
          move_interval: 35ms
          scan_width:    3

      # Random sparkle — Idle, Check
      - addressable_twinkle:
          name: "Twinkle"
          twinkle_probability: 5%
          progress_interval:   32ms

      # Spark burst — festive Idle
      - addressable_fireworks:
          name: "Fireworks"
          update_interval:    32ms
          spark_probability:  10%
          use_random_color:   false
          fade_out_rate:      120

      # Colour sweeps strip — Homing, Check
      - addressable_color_wipe:
          name: "Color Wipe"
          colors:
            - red: 0%
              green: 31%
              blue:  100%
              num_leds:  5
              gradient:  true
            - red: 0%
              green: 0%
              blue:  0%
              num_leds:  3
          add_led_interval: 40ms
          reverse: false

      # Rainbow wash — decorative
      - addressable_rainbow:
          name: "Rainbow"
          speed: 10
          width: 50

      # ── Progress bar ─────────────────────────────────────────────────────── #
      #
      # Reads the cnc_progress number entity (0–100) and lights the strip
      # proportionally: filled → fill colour, tip → head colour, rest → bg.
      # Colours come from the three virtual RGB light entities (prog_fill,
      # prog_bg, prog_head) — set live from the ncSender plugin or web UI.

      - addressable_lambda:
          name: "Progress Bar"
          update_interval: 40ms
          lambda: |-
            float pct   = id(cnc_progress).state / 100.0f;
            int   total = it.size();
            int   filled = (int)(pct * total);
            bool  inv   = id(prog_invert).state;

            // Use stored colours if the virtual light has been set; otherwise fall back
            // to sensible defaults so the bar works even before the plugin connects.
            Color fill_c, bg_c, head_c;
            if (id(prog_fill_light).current_values.is_on()) {
              auto fv = id(prog_fill_light).current_values;
              fill_c = Color((int)(fv.get_red()*255), (int)(fv.get_green()*255), (int)(fv.get_blue()*255));
            } else { fill_c = Color(0, 80, 255); }

            if (id(prog_bg_light).current_values.is_on()) {
              auto bv = id(prog_bg_light).current_values;
              bg_c = Color((int)(bv.get_red()*255), (int)(bv.get_green()*255), (int)(bv.get_blue()*255));
            } else { bg_c = Color(0, 0, 0); }

            if (id(prog_head_light).current_values.is_on()) {
              auto hv = id(prog_head_light).current_values;
              head_c = Color((int)(hv.get_red()*255), (int)(hv.get_green()*255), (int)(hv.get_blue()*255));
            } else { head_c = Color(255, 255, 255); }

            for (int i = 0; i < total; i++) {
              int pixel = inv ? (total - 1 - i) : i;
              if (pct <= 0.0f) {
                it[pixel] = bg_c;
              } else if (i < filled) {
                it[pixel] = fill_c;
              } else if (i == filled && pct < 1.0f) {
                it[pixel] = head_c;   // bright tip showing current position
              } else {
                it[pixel] = bg_c;
              }
            }
