# =============================================================================
#  CNC Status Light — ESPHome configuration
#  for use with the ncSender "ESP Status Light" plugin
# =============================================================================
#
#  Quick-start
#  -----------
#  1. Copy secrets.yaml.example → secrets.yaml  (same folder) and fill it in.
#  2. Edit the substitutions below to match your board and LED strip.
#  3. Run:  esphome run cnc-status-light.yaml
#  4. Note the static_ip — enter it as "ESP32 Host" in the ncSender plugin.
#
#  Supported boards (set 'board' under esp32:)
#    esp32dev          — generic ESP32 / WROOM-32 / WROVER
#    esp32-s3-devkitc-1 — ESP32-S3
#    esp32-c3-devkitm-1 — ESP32-C3  (use single-core framework)
#    lolin_s2_mini     — LOLIN S2 Mini (ESP32-S2)
#
#  Supported LED strips (set led_type + led_variant)
#    WS2812B  → type: GRB,  variant: WS2812
#    SK6812   → type: GRBW, variant: SK6812  (has white channel)
#    WS2811   → type: RGB,  variant: WS2811
#    APA102   → use platform: fastled_spi instead of neopixelbus
#    NeoPixel → same as WS2812B
# =============================================================================

substitutions:
  device_name:  cnc-status-light
  friendly_name: CNC Status Light

  # ── Network ─────────────────────────────────────────────────────────────── #
  static_ip:  "192.168.1.100"   # Must match "ESP32 Host" in ncSender plugin
  gateway:    "192.168.1.1"
  subnet:     "255.255.255.0"

  # ── LED strip hardware ───────────────────────────────────────────────────── #
  data_pin:    GPIO48            # GPIO48 = onboard RGB LED on ESP32-S3 DevKitC
  num_leds:    "1"              # 1 for onboard LED; change when using a strip
  led_type:    GRB              # GRB for WS2812B | GRBW for SK6812
  led_variant: WS2812           # WS2812 | WS2812B | SK6812 | WS2811

  # ── Progress bar colours (RGB 0–255) ────────────────────────────────────── #
  # These are compiled into the firmware — re-flash after changing.
  prog_r:      "0"              # Fill colour — blue by default
  prog_g:      "80"
  prog_b:      "255"
  prog_bg_r:   "5"              # Background (unfilled) — near-black
  prog_bg_g:   "5"
  prog_bg_b:   "5"
  prog_head_r: "255"            # Head (tip) LED — bright white
  prog_head_g: "255"
  prog_head_b: "255"

# =============================================================================

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: arduino

# ── WiFi ──────────────────────────────────────────────────────────────────── #

wifi:
  ssid:     !secret wifi_ssid
  password: !secret wifi_password

  # Static IP keeps the ncSender plugin address stable after reboots
  manual_ip:
    static_ip: ${static_ip}
    gateway:   ${gateway}
    subnet:    ${subnet}

  # Fallback access point if the main network is unreachable
  ap:
    ssid:     !secret fallback_ap_ssid
    password: !secret fallback_ap_password

captive_portal:

# ── Core services ─────────────────────────────────────────────────────────── #

logger:
  level: INFO

# ESPHome native API — optional, enables Home Assistant integration.
# Uncomment and add api_encryption_key to secrets.yaml if you use HA.
# api:
#   encryption:
#     key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

# Web server — REQUIRED: this is the REST API used by the ncSender plugin
web_server:
  port: 80

# ── Progress value entity ──────────────────────────────────────────────────── #
#
# The ncSender plugin posts the job completion percentage here:
#   POST http://<ip>/number/cnc_progress/set?value=45.5
#
# Entity ID is set by `name:` lowercased with spaces → underscores → "cnc_progress"
# Must match "Progress Entity ID" in the ncSender plugin settings.

number:
  - platform: template
    name:          "cnc_progress"
    id:            cnc_progress
    icon:          mdi:percent
    min_value:     0
    max_value:     100
    step:          0.1
    optimistic:    true
    initial_value: 0
    restore_value: false
    set_action:
      - lambda: "id(cnc_progress).publish_state(x);"

# ── LED strip ─────────────────────────────────────────────────────────────── #
#
# Entity name → "cnc_status" (used as Light Entity ID in plugin settings).
#
# For APA102 / SK9822 (SPI-based strips), replace 'neopixelbus' with:
#   platform: fastled_spi
#   chipset:  APA102
#   data_pin: ${data_pin}
#   clock_pin: GPIO18          # APA102 also needs a clock pin

light:
  - platform: neopixelbus
    type:     ${led_type}
    variant:  ${led_variant}
    pin:      ${data_pin}
    num_leds: ${num_leds}
    name:     "cnc_status"
    id:       cnc_status
    restore_mode: ALWAYS_OFF
    default_transition_length: 300ms

    effects:

      # ── Works on any strip ───────────────────────────────────────────────── #

      # Gentle breathe — Hold, Door, Tool Change
      - pulse:
          name: "Pulse"
          transition_length: 700ms
          update_interval:   700ms
          min_brightness:    15%
          max_brightness:    100%

      # Rapid flash — Alarm (urgent)
      - pulse:
          name: "Fast Pulse"
          transition_length: 140ms
          update_interval:   140ms
          min_brightness:    5%
          max_brightness:    100%

      # Hard on/off strobe — Alarm, Door
      - strobe:
          name: "Strobe"
          colors:
            - state: true
              brightness: 100%
              duration:   60ms
            - state: false
              duration:   120ms

      # Candle-like flicker — Tool Change
      - flicker:
          name: "Flicker"
          alpha:     0.95
          intensity: 2%

      # ── Addressable-strip effects ────────────────────────────────────────── #

      # Bouncing segment — Homing
      - addressable_scan:
          name: "Scan"
          move_interval: 55ms
          scan_width:    3

      # Random sparkle — Idle, Check
      - addressable_twinkle:
          name: "Twinkle"
          twinkle_probability: 5%
          progress_interval:   32ms

      # Spark burst — festive Idle
      - addressable_fireworks:
          name: "Fireworks"
          update_interval:    32ms
          spark_probability:  10%
          use_random_color:   false
          fade_out_rate:      120

      # Colour sweeps strip — Homing, Check
      - addressable_color_wipe:
          name: "Color Wipe"
          colors:
            - red: 0%
              green: 31%
              blue:  100%
              num_leds:  5
              gradient:  true
            - red: 0%
              green: 0%
              blue:  0%
              num_leds:  3
          add_led_interval: 40ms
          reverse: false

      # Rainbow wash — decorative
      - addressable_rainbow:
          name: "Rainbow"
          speed: 10
          width: 50

      # ── Progress bar ─────────────────────────────────────────────────────── #
      #
      # Reads the cnc_progress number entity (0–100) and lights the strip
      # proportionally: filled → progress colour, tip → head colour, rest → bg.
      # Colours are controlled by the substitution variables at the top.

      - addressable_lambda:
          name: "Progress Bar"
          update_interval: 40ms
          lambda: |-
            float pct   = id(cnc_progress).state / 100.0f;
            int   filled = (int)(pct * it.size());

            Color fill_c = Color(${prog_r},      ${prog_g},      ${prog_b});
            Color bg_c   = Color(${prog_bg_r},   ${prog_bg_g},   ${prog_bg_b});
            Color head_c = Color(${prog_head_r}, ${prog_head_g}, ${prog_head_b});

            for (int i = 0; i < it.size(); i++) {
              if (pct <= 0.0f) {
                it[i] = bg_c;
              } else if (i < filled) {
                it[i] = fill_c;
              } else if (i == filled && pct < 1.0f) {
                it[i] = head_c;   // bright tip showing current position
              } else {
                it[i] = bg_c;
              }
            }
